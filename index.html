<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数独</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <div class="app-shell">
    <main class="layout">
      <section class="playground">
        <div class="board-stage glass">
          <div class="board-head">
            <div class="board-topline">
              <h2 class="section-heading">当前对局</h2>
              <div class="session-meta">
                <label class="meta-chip meta-chip-select" for="difficultySelect">
                  <span>难度</span>
                  <select id="difficultySelect">
                    <option value="easy">简单</option>
                    <option value="medium" selected>中等</option>
                    <option value="hard">困难</option>
                  </select>
                </label>
                <div class="meta-chip">
                  <span>计时</span>
                  <strong id="timerLabel">00:00</strong>
                </div>
                <span id="modeLabel" class="panel-badge mode-badge">自由对局</span>
              </div>
            </div>
            <div class="play-actions" aria-label="游戏操作">
              <button id="newGameBtn" class="btn-primary" type="button">新开局</button>
              <button id="hintBtn" class="btn-secondary" type="button">提示</button>
              <button id="checkBtn" class="btn-quiet" type="button">检查</button>
              <button id="eraseBtn" class="btn-quiet" type="button">擦除</button>
              <button id="noteBtn" class="btn-quiet" type="button" aria-pressed="false">笔记</button>
              <button id="undoBtn" class="btn-quiet" type="button">撤销</button>
              <button id="redoBtn" class="btn-quiet" type="button">重做</button>
            </div>
          </div>
          <p id="message" class="message" data-type="info" aria-live="polite">正在准备棋盘...</p>
          <div class="board-wrap">
            <div class="board-pane">
              <div id="board" class="board" role="grid" aria-label="Sudoku board"></div>
            </div>
          </div>
          <section class="controls-surface" aria-label="输入区">
            <div class="controls-grid">
              <section class="controls-panel pad-panel">
                <div class="panel-head">
                  <h3>数字盘</h3>
                </div>
                <div id="numberPad" class="number-pad">
                  <button class="digit-btn" type="button" data-digit="1"><span class="digit">1</span><span class="count">0/9</span></button>
                  <button class="digit-btn" type="button" data-digit="2"><span class="digit">2</span><span class="count">0/9</span></button>
                  <button class="digit-btn" type="button" data-digit="3"><span class="digit">3</span><span class="count">0/9</span></button>
                  <button class="digit-btn" type="button" data-digit="4"><span class="digit">4</span><span class="count">0/9</span></button>
                  <button class="digit-btn" type="button" data-digit="5"><span class="digit">5</span><span class="count">0/9</span></button>
                  <button class="digit-btn" type="button" data-digit="6"><span class="digit">6</span><span class="count">0/9</span></button>
                  <button class="digit-btn" type="button" data-digit="7"><span class="digit">7</span><span class="count">0/9</span></button>
                  <button class="digit-btn" type="button" data-digit="8"><span class="digit">8</span><span class="count">0/9</span></button>
                  <button class="digit-btn" type="button" data-digit="9"><span class="digit">9</span><span class="count">0/9</span></button>
                </div>
              </section>

              <section class="controls-panel utility-panel">
                <div class="panel-head">
                  <h3>工具</h3>
                </div>
                <div class="utility-actions">
                  <button id="openCellPanelBtn" class="btn-quiet" type="button">当前格</button>
                  <button id="openInspectPanelBtn" class="btn-quiet" type="button">观察</button>
                  <button id="openTutorialPanelBtn" class="btn-quiet" type="button">教程</button>
                </div>
              </section>
            </div>
          </section>
        </div>
      </section>
    </main>

    <div id="overlayLayer" class="overlay-layer" hidden>
      <button class="overlay-backdrop" type="button" data-close-overlay aria-label="关闭浮层"></button>

      <section id="cellPanel" class="overlay-panel glass" hidden aria-label="当前格面板">
        <div class="overlay-header">
          <div class="panel-head">
            <h3>当前格</h3>
            <button class="btn-quiet overlay-close" type="button" data-close-overlay>关闭</button>
          </div>
        </div>
        <div class="overlay-body">
          <div class="panel-head">
            <span id="cellBadge" class="panel-badge">未选中</span>
          </div>
          <p id="cellSummary" class="panel-copy">选中格子后显示位置、状态和候选。</p>
          <div id="candidatePreview" class="candidate-preview" aria-label="Candidate preview"></div>
        </div>
      </section>

      <section id="inspectPanel" class="overlay-panel glass" hidden aria-label="观察面板">
        <div class="overlay-header">
          <div class="panel-head">
            <h3>观察</h3>
            <button class="btn-quiet overlay-close" type="button" data-close-overlay>关闭</button>
          </div>
        </div>
        <div class="overlay-body">
          <div class="panel-head">
            <span id="globalInspectBadge" class="panel-badge subtle-badge">关闭</span>
          </div>
          <p class="panel-copy">只观察整盘某个数字，不会直接填数。</p>
          <div id="digitInspector" class="digit-inspector" aria-label="Global digit inspector">
            <button class="inspect-digit-btn" type="button" data-inspect-digit="1">1</button>
            <button class="inspect-digit-btn" type="button" data-inspect-digit="2">2</button>
            <button class="inspect-digit-btn" type="button" data-inspect-digit="3">3</button>
            <button class="inspect-digit-btn" type="button" data-inspect-digit="4">4</button>
            <button class="inspect-digit-btn" type="button" data-inspect-digit="5">5</button>
            <button class="inspect-digit-btn" type="button" data-inspect-digit="6">6</button>
            <button class="inspect-digit-btn" type="button" data-inspect-digit="7">7</button>
            <button class="inspect-digit-btn" type="button" data-inspect-digit="8">8</button>
            <button class="inspect-digit-btn" type="button" data-inspect-digit="9">9</button>
          </div>
        </div>
      </section>

      <section id="tutorialPanel" class="overlay-panel overlay-panel-wide glass" hidden aria-label="教程面板">
        <div class="overlay-header">
          <div class="panel-head">
            <h3>教程关卡</h3>
            <button class="btn-quiet overlay-close" type="button" data-close-overlay>关闭</button>
          </div>
        </div>
        <div class="overlay-body tutorial-overlay-body">
          <section class="overlay-card">
            <div class="panel-head">
              <h3 id="tutorialDetailTitle">教程解析</h3>
              <span id="tutorialDetailTag" class="panel-badge subtle-badge">自由对局</span>
            </div>
            <p id="tutorialDetailSummary" class="panel-copy">教程模式会在这里说明当前技巧和观察顺序。</p>
            <div id="tutorialDetailSteps" class="tutorial-steps"></div>
          </section>
          <section class="overlay-card">
            <div class="panel-head">
              <h3>关卡列表</h3>
            </div>
            <div id="tutorialList" class="tutorial-list"></div>
          </section>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="scripts/app.js"></script>
</body>
</html>
